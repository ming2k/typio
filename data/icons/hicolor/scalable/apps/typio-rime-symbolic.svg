<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Rime trident symbol (Ψ) — symbolic, panel will recolor -->
  <g fill="#2e3436">
    <!-- Left prong -->
    <path d="M4.5 2.5 C4.5 5.5, 6 7, 8 7.5" stroke="#2e3436" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Right prong -->
    <path d="M11.5 2.5 C11.5 5.5, 10 7, 8 7.5" stroke="#2e3436" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Vertical stem -->
    <rect x="7.2" y="5" width="1.6" height="8" rx="0.8"/>
    <!-- Base -->
    <rect x="4" y="12" width="8" height="1.6" rx="0.8"/>
  </g>
</svg>
